name: "DeepSAST"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  comprehensive-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SEMGREP: Escaneo exhaustivo de lógica PHP/JS/SQL
      - name: Semgrep OSS Scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep \
          semgrep scan --config auto --sarif --output report-semgrep.sarif
        continue-on-error: true

      # 2. TRIVY: Escaneo de FileSystem (Librerías/SCA)
      - name: Trivy FS Scan (Vulnerabilities)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      # 3. TRIVY: Escaneo de Config (Docker/K8s/Misconfigurations)
      - name: Trivy Config Scan (Misconfigurations)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      # 4. HORUSEC: Análisis multi-lenguaje (Excelente para PHP)
      - name: Horusec Scan
        run: |
          curl -fsSL https://raw.githubusercontent.com/ZupIT/horusec/main/deployments/scripts/install.sh | bash -s latest
          ./horusec start -p="./" -e="true" -o="text"
        continue-on-error: true

      # 5. TRUFFLEHOG: Búsqueda de Secretos/Keys
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
