name: "DeepSAST"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  comprehensive-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SEMGREP (Análisis de Código y Lógica)
      - name: Semgrep OSS Scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep \
          semgrep scan --config auto --sarif --output report-semgrep.sarif
        continue-on-error: true

      # 2. TRIVY (Busca vulnerabilidades en dependencias, Docker y Misconfigurations)
      - name: Trivy Scan (FS & Config)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs,config'
          hide-progress: false
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      # 3. HORUSEC (Multi-motor: busca en PHP, JS, Shell, Dockerfiles, etc.)
      - name: Horusec Scan
        run: |
          curl -fsSL https://raw.githubusercontent.com/ZupIT/horusec/main/deployments/scripts/install.sh | bash -s latest
          horusec start -p="./" -e="true" -o="text"
        continue-on-error: true

      # 4. TRUFFLEHOG (Búsqueda de credenciales y secretos expuestos)
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
